version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: loja_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: loja_online
      MYSQL_USER: loja_user
      MYSQL_PASSWORD: loja_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: loja_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: loja_user
      DB_PASSWORD: loja_pass
      DB_NAME: loja_online
      JWT_SECRET: super_secret_change_me
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  # Parte 2 — Aplicação Web Cliente (ReactJS, servida via Nginx)
  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:3000
    container_name: loja_web
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db_data:
